<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Lookup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      min-height: 100vh;
      background-color: #f4f4f4;
    }

    h1 { font-size: 2rem; }

    .search-row { display: flex; gap: 0.5rem; }

    input {
      padding: 0.75rem 1rem;
      font-size: 1.25rem;
      border: 2px solid #ccc;
      border-radius: 0.25rem;
      width: 300px;
    }

    button {
      padding: 0.75rem 1.5rem;
      background-color: #007bff;
      font-size: 1.25rem;
      color: #fff;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover { background-color: #0056b3; }

    #output {
      max-width: 500px;
      min-height: 100px;
      padding: 20px;
      background-color: #fff;
      border-radius: 0.25rem;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Weather Lookup</h1>

  <div class="search-row">
    <input type="text" id="city-input" placeholder="Enter a city name...">
    <button type="button" id="search-btn">Search</button>
  </div>

  <div id="output">
    <p>Enter a city name and click Search to see the weather.</p>
  </div>

  <script>
    const button = document.getElementById("search-btn");
    const input  = document.getElementById("city-input");
    const output = document.getElementById("output");

    async function runSearch() {
      const city = input.value.trim();

      if (!city) {
        output.innerHTML = "<p>Please enter a city name.</p>";
        return;
      }

      output.innerHTML = "<p>Loading...</p>";

      try {
        // 1) Geocode
        const geoUrl = `https://cse2004.com/api/geocode?address=${encodeURIComponent(city)}`;
        const geoRes = await fetch(geoUrl);
        if (!geoRes.ok) throw new Error(`Geocode request failed (${geoRes.status})`);
        const geoData = await geoRes.json();

        const lat = geoData?.results?.[0]?.geometry?.location?.lat;
        const lng = geoData?.results?.[0]?.geometry?.location?.lng;

        if (lat == null || lng == null) {
          throw new Error("Could not find that location. Try a more specific city name.");
        }

        // 2) Weather
        const weatherUrl = `https://cse2004.com/api/weather?latitude=${lat}&longitude=${lng}`;
        const weatherRes = await fetch(weatherUrl);
        if (!weatherRes.ok) throw new Error(`Weather request failed (${weatherRes.status})`);
        const weatherData = await weatherRes.json();

        // Inspect if needed:
        // console.log("geoData:", geoData);
        // console.log("weatherData:", weatherData);

        const temp  = weatherData?.temperature?.degrees;
        const unit  = weatherData?.temperature?.unit; // "FAHRENHEIT" or "CELSIUS" etc
        const desc  = weatherData?.weatherCondition?.description ?? weatherData?.description;
        const humid = weatherData?.relativeHumidity ?? weatherData?.humidity;

        const unitShort =
          unit === "FAHRENHEIT" ? "F" :
          unit === "CELSIUS" ? "C" :
          (unit ? unit : "");

        output.innerHTML = `
          <h2>${city}</h2>
          <p><strong>Coordinates:</strong> ${lat.toFixed(3)}, ${lng.toFixed(3)}</p>
          <p><strong>Temperature:</strong> ${temp ?? "?"}°${unitShort}</p>
          ${desc ? `<p><strong>Condition:</strong> ${desc}</p>` : ""}
          ${humid != null ? `<p><strong>Humidity:</strong> ${humid}%</p>` : ""}
        `;
      } catch (error) {
        console.error(error);
        output.innerHTML = `<p>Something went wrong: ${error.message}</p>`;
      }
    }

    button.addEventListener("click", runSearch);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runSearch();
    });
  </script>

</body>
</html>
